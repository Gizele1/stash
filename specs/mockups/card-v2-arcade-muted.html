<!DOCTYPE html>

<style>
        .pixel-border-b {
            background-image: linear-gradient(to right, #3a3a5c 50%, transparent 50%);
            background-size: 4px 2px;
            background-repeat: repeat-x;
        }
        .arcade-button-shadow {
            border-bottom: 2px solid #2e2659;
            border-right: 2px solid #2e2659;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex items-center justify-center p-4 font-body">
<!-- THE ANALOG TACTICIAN POPUP CARD -->
<div class="w-[320px] bg-[#12121f] border-2 border-[#3a3a5c] flex flex-col relative overflow-hidden shadow-[8px_8px_0px_0px_rgba(13,13,26,1)]">
<!-- HEADER / TOP SECTION -->
<div class="p-4 pt-8 border-b-2 border-[#3a3a5c] relative">
<!-- AUTO BADGE -->
<div class="absolute top-0 left-0 bg-[#c4956a] text-[#2d1600] text-[10px] font-bold px-2 py-0.5 tracking-widest flex items-center justify-center">
                AUTO
            </div>
<div class="space-y-3">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-[#b1a1ff] text-[18px]" style="font-variation-settings: 'FILL' 1;">terminal</span>
<p class="text-[12px] leading-relaxed text-[#e0e0e0] font-medium tracking-tight">
                        正在修复 token refresh 的边界 case。策略变更：从 throw error 改为 silent retry + log。Max retry 设为 5。当前 8/12 tests pass。
                    </p>
</div>
</div>
</div>
<!-- MIDDLE SECTION (METADATA) -->
<div class="px-4 py-3 bg-[#0d0d1a] relative">
<!-- PIXELATED TOP BORDER SIMULATION -->
<div class="absolute top-0 left-0 w-full h-[2px] pixel-border-b opacity-50"></div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 bg-[#5cb8a5]"></span>
<span class="text-[11px] text-[#5cb8a5] font-semibold tracking-wider">Claude Code 完成 · PR #287 待 review</span>
</div>
</div>
<!-- BOTTOM SECTION (ACTIONS) -->
<div class="p-4 bg-[#12121f] border-t-2 border-[#3a3a5c]">
<button class="w-full h-10 bg-[#7b6bb5] text-white flex items-center justify-center gap-2 active:translate-x-[1px] active:translate-y-[1px] transition-all arcade-button-shadow">
<span class="text-[13px] font-bold tracking-widest">打开 PR →</span>
</button>
<!-- OPTIONAL SYSTEM FOOTER -->
<div class="mt-4 flex justify-between items-center opacity-40">
<div class="flex gap-1">
<div class="w-1.5 h-1.5 bg-[#b1a1ff]"></div>
<div class="w-1.5 h-1.5 bg-[#b1a1ff]"></div>
<div class="w-1.5 h-1.5 bg-[#b1a1ff]"></div>
</div>
<span class="text-[9px] font-bold tracking-[0.2em] text-[#b1a1ff]">STASH_OS v4.2</span>
</div>
</div>
<!-- ANALOG DECORATION (Right Edge Tape) -->
<div class="absolute right-[-10px] top-[20%] w-4 h-12 bg-[#3a3a5c] rotate-45 opacity-20"></div>
</div>
<!-- BACKGROUND GRID FOR CONTEXT -->
<div class="fixed inset-0 -z-10 opacity-[0.03] pointer-events-none" style="background-image: linear-gradient(#b1a1ff 1px, transparent 1px), linear-gradient(90deg, #b1a1ff 1px, transparent 1px); background-size: 20px 20px;">
</div>
