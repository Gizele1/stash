<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&amp;family=IBM+Plex+Sans:wght@400;600&amp;family=Space+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#534AB7",
                        accent_teal: "#0F6E56",
                        accent_teal_dark: "#0a2620",
                        accent_red: "#a04040",
                        accent_red_dark: "#2a1010",
                        terminal_bg: "#0d0d1a",
                        border_gray: "#292937"
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "0px"
                    },
                    fontFamily: {
                        headline: ["Space Grotesk", "sans-serif"],
                        body: ["Ibm Plex Sans", "sans-serif"],
                        mono: ["Space Mono", "monospace"]
                    }
                },
            },
        }
    </script>
<style>
        .pixel-art {
            image-rendering: pixelated;
        }
        .spirit-glow {
            filter: drop-shadow(0 0 4px #c4b5ff);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
            font-size: 12px;
        }
    </style>
</head>
<body class="bg-transparent antialiased overflow-hidden flex items-center justify-center h-screen w-screen">
<!-- PET WINDOW CONTAINER (200x200px) -->
<div class="w-[200px] h-[200px] bg-terminal_bg/90 relative flex items-center justify-center border-none overflow-hidden">
<!-- Background Decor: Pixel Stars -->
<div class="absolute top-8 left-12 w-1 h-1 bg-[#c9beff] opacity-40"></div>
<div class="absolute bottom-10 right-6 w-1 h-1 bg-[#54dace] opacity-30"></div>
<div class="absolute top-1/2 left-4 w-1 h-1 bg-white opacity-20"></div>
<!-- PET: CAT-SPIRIT PIXEL ART (64x64px) -->
<div class="relative w-16 h-16 flex items-center justify-center spirit-glow">
<svg class="pixel-art" fill="none" height="64" viewbox="0 0 64 64" width="64" xmlns="http://www.w3.org/2000/svg">
<!-- Ears -->
<rect fill="#c4b5ff" height="8" width="8" x="12" y="16"></rect>
<rect fill="#c4b5ff" height="8" width="8" x="44" y="16"></rect>
<rect fill="#7b6bb5" height="4" width="4" x="12" y="20"></rect>
<rect fill="#7b6bb5" height="4" width="4" x="48" y="20"></rect>
<!-- Body/Head -->
<rect fill="#c4b5ff" height="28" width="32" x="16" y="24"></rect>
<!-- Shading -->
<rect fill="#7b6bb5" height="4" width="32" x="16" y="48"></rect>
<rect fill="#7b6bb5" height="20" width="4" x="44" y="28"></rect>
<!-- Eyes -->
<rect fill="white" height="4" width="4" x="24" y="32"></rect>
<rect fill="white" height="4" width="4" x="36" y="32"></rect>
<!-- Tail -->
<rect fill="#c4b5ff" height="4" width="8" x="48" y="40"></rect>
<rect fill="#c4b5ff" height="4" width="4" x="52" y="36"></rect>
</svg>
</div>
<!-- STATUS BUBBLES -->
<!-- 1. Top-Left: AS -->
<div class="absolute top-6 left-6 w-6 h-6 border-2 border-accent_teal bg-accent_teal_dark flex flex-col items-center justify-center">
<span class="font-mono text-[10px] leading-none text-[#E1F5EE] tracking-tighter">AS</span>
<span class="material-symbols-outlined text-[#E1F5EE] scale-75 mt-[-2px]">settings</span>
</div>
<!-- 2. Top-Right: ST -->
<div class="absolute top-6 right-6 w-6 h-6 border-2 border-accent_teal bg-transparent flex flex-col items-center justify-center">
<span class="font-mono text-[10px] leading-none text-accent_teal tracking-tighter font-bold">ST</span>
<span class="material-symbols-outlined text-accent_teal scale-75 mt-[-2px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- 3. Bottom Center: DX -->
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-6 h-6 border-2 border-accent_red bg-accent_red_dark flex flex-col items-center justify-center">
<span class="font-mono text-[10px] leading-none text-[#FAEEDA] tracking-tighter">DX</span>
<span class="material-symbols-outlined text-[#FAEEDA] scale-75 mt-[-2px]">close</span>
</div>
<!-- UI Frame/Aesthetic Accents -->
<div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-border_gray"></div>
<div class="absolute top-0 right-0 w-2 h-2 border-t border-r border-border_gray"></div>
<div class="absolute bottom-0 left-0 w-2 h-2 border-b border-l border-border_gray"></div>
<div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-border_gray"></div>
</div>
</body></html>
