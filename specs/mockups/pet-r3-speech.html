        .staircase-dr { position: absolute; bottom: -8px; right: 4px; width: 8px; height: 8px; background: linear-gradient(135deg, transparent 50%, #3a3a5c 50%, #3a3a5c 62.5%, #1e1e2c 62.5%); }
