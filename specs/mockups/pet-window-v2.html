<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#12121f",
                        "inverse-on-surface": "#2f2f3d",
                        "on-error": "#690005",
                        "secondary-fixed": "#74f7ea",
                        "primary-fixed": "#e6deff",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed": "#1b0062",
                        "surface-variant": "#343342",
                        "on-tertiary-fixed": "#410005",
                        "on-primary": "#311c7e",
                        "on-surface-variant": "#c9c4d3",
                        "on-secondary-fixed-variant": "#00504a",
                        "secondary-fixed-dim": "#54dace",
                        "on-background": "#e3e0f4",
                        "background": "#12121f",
                        "on-tertiary-container": "#6c000e",
                        "on-secondary-fixed": "#00201d",
                        "outline-variant": "#484552",
                        "surface-tint": "#c9beff",
                        "on-primary-fixed-variant": "#483795",
                        "surface-container-highest": "#343342",
                        "primary-container": "#9d8df1",
                        "outline": "#938f9d",
                        "secondary": "#54dace",
                        "on-secondary-container": "#003a36",
                        "on-primary-container": "#331f80",
                        "tertiary": "#ffb3af",
                        "surface": "#12121f",
                        "on-tertiary": "#68000d",
                        "on-tertiary-fixed-variant": "#920418",
                        "on-surface": "#e3e0f4",
                        "secondary-container": "#00aea2",
                        "surface-bright": "#383847",
                        "on-secondary": "#003733",
                        "tertiary-fixed": "#ffdad7",
                        "inverse-primary": "#6050af",
                        "surface-container-low": "#1a1a28",
                        "primary-fixed-dim": "#c9beff",
                        "surface-container-high": "#292937",
                        "primary": "#c9beff",
                        "error-container": "#93000a",
                        "surface-container": "#1e1e2c",
                        "tertiary-fixed-dim": "#ffb3af",
                        "inverse-surface": "#e3e0f4",
                        "tertiary-container": "#ff6a68",
                        "surface-container-lowest": "#0d0d1a",
                        "error": "#ffb4ab"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Space Grotesk"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
<style>
        .pixel-art-grid {
            background-image: 
                radial-gradient(#484552 1px, transparent 1px);
            background-size: 8px 8px;
        }
        .pixel-shadow {
            box-shadow: 2px 2px 0px 0px #0d0d1a;
        }
        .cat-ear-l { clip-path: polygon(100% 0, 0% 100%, 100% 100%); }
        .cat-ear-r { clip-path: polygon(0 0, 0% 100%, 100% 100%); }
    </style>
</head>
<body class="bg-[#0d0d1a] flex items-center justify-center min-h-screen m-0 p-0 overflow-hidden select-none">
<!-- 200x200 Canvas -->
<div class="relative w-[200px] h-[200px] bg-surface-container-lowest overflow-hidden flex items-center justify-center">
<!-- Micro-stars/Dots background -->
<div class="absolute inset-0 opacity-40">
<div class="absolute top-4 left-10 w-1 h-1 bg-[#c9beff]"></div>
<div class="absolute top-16 left-32 w-1 h-1 bg-[#54dace]"></div>
<div class="absolute bottom-10 left-8 w-1 h-1 bg-[#484552]"></div>
<div class="absolute bottom-24 right-6 w-1 h-1 bg-[#c9beff]"></div>
<div class="absolute top-32 left-4 w-1 h-1 bg-[#9d8df1]"></div>
<div class="absolute top-10 right-10 w-1 h-1 bg-[#54dace]"></div>
</div>
<!-- The Pet Character (~64x64px center) -->
<div class="relative w-16 h-16 flex items-center justify-center z-10">
<!-- Ears -->
<div class="absolute top-0 left-2 w-4 h-5 bg-[#c4b5ff] border-t border-l border-r border-[#7b6bb5] cat-ear-l"></div>
<div class="absolute top-0 right-2 w-4 h-5 bg-[#c4b5ff] border-t border-l border-r border-[#7b6bb5] cat-ear-r"></div>
<!-- Body (Lavender base) -->
<div class="absolute bottom-0 w-14 h-12 bg-[#c4b5ff] border-[1px] border-[#7b6bb5] rounded-t-2xl rounded-b-lg">
<!-- Shading (Dark purple) -->
<div class="absolute bottom-0 right-0 w-6 h-4 bg-[#7b6bb5] opacity-40 rounded-br-lg"></div>
<!-- Eyes (White dot) -->
<div class="absolute top-4 left-3 w-1.5 h-1.5 bg-white"></div>
<div class="absolute top-4 right-3 w-1.5 h-1.5 bg-white"></div>
<!-- Blush (Tertiary faint) -->
<div class="absolute top-6 left-2 w-2 h-1 bg-[#ffb3af] opacity-50"></div>
<div class="absolute top-6 right-2 w-2 h-1 bg-[#ffb3af] opacity-50"></div>
<!-- Mouth -->
<div class="absolute top-6 left-1/2 -translate-x-1/2 w-2 h-0.5 bg-[#7b6bb5]"></div>
</div>
<!-- Tiny Pixel Sparkle -->
<div class="absolute -top-2 -right-2 w-2 h-2">
<div class="absolute top-1 left-0 w-2 h-0.5 bg-[#54dace]"></div>
<div class="absolute top-0 left-1 w-0.5 h-2 bg-[#54dace]"></div>
</div>
</div>
<!-- Status Bubble 1: Top-Left "AS" -->
<div class="absolute top-6 left-6 w-7 h-7 bg-[#1a3d35] border border-[#0F6E56] rounded-full flex items-center justify-center z-20">
<span class="font-['Space_Grotesk'] text-[9px] text-[#54dace] font-bold tracking-tight">AS</span>
</div>
<!-- Status Bubble 2: Top-Right "ST" -->
<div class="absolute top-6 right-6 w-7 h-7 border-2 border-[#0F6E56] rounded-full flex items-center justify-center z-20">
<span class="font-['Space_Grotesk'] text-[9px] text-[#54dace] font-bold tracking-tight">ST</span>
</div>
<!-- Status Bubble 3: Bottom-Center "DX" -->
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-7 h-7 bg-[#3d1a1a] border border-[#a04040] rounded-full flex items-center justify-center z-20">
<span class="font-['Space_Grotesk'] text-[9px] text-[#ffb3af] font-bold tracking-tight">DX</span>
</div>
<!-- Background Vignette/Depth -->
<div class="absolute inset-0 pointer-events-none border-[1px] border-[#484552]/20"></div>
</div>
</body></html>
