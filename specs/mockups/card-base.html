<!DOCTYPE html>

<html class="dark" lang="zh"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=IBM+Plex+Sans:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#534AB7",
                        "primary-muted": "#534AB733",
                        "status-teal": "#0F6E56",
                        "status-teal-light": "#E1F5EE",
                        "bg-dark": "#1a1a2e",
                        "surface-dark": "#0f172a",
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        headline: ["Space Grotesk", "monospace"],
                        body: ["IBM Plex Sans", "sans-serif"],
                        label: ["Space Grotesk", "monospace"],
                        mono: ["IBM Plex Mono", "monospace"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
            font-size: 18px;
        }
        body {
            background-color: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body class="bg-slate-950 font-body">
<!-- Stash 2.0 SideNavBar (Shared Component) -->
<aside class="fixed left-0 top-0 h-full w-16 bg-slate-950 text-[#534AB7] font-mono text-[10px] uppercase border-r-2 border-[#534AB7] flex flex-col py-4 gap-4 items-center z-50">
<div class="mb-4 text-center">
<div class="w-10 h-10 bg-[#534AB7]/20 border border-[#534AB7] flex items-center justify-center mb-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pixel_journal</span>
</div>
<span class="text-sm font-bold text-[#534AB7] block">STASH 2.0</span>
<span class="text-[8px] text-slate-500">Idle Mode</span>
</div>
<nav class="flex flex-col gap-4 w-full px-2">
<!-- Active Tab: Intent -->
<button class="bg-[#534AB7] text-white p-1 flex flex-col items-center gap-1 group active:scale-95 duration-75">
<span class="material-symbols-outlined">timeline</span>
<span>Intent</span>
</button>
<button class="text-slate-400 p-1 flex flex-col items-center gap-1 group hover:bg-[#534AB7]/10 active:scale-95 duration-75">
<span class="material-symbols-outlined">terminal</span>
<span>Claude</span>
</button>
<button class="text-slate-400 p-1 flex flex-col items-center gap-1 group hover:bg-[#534AB7]/10 active:scale-95 duration-75">
<span class="material-symbols-outlined">code</span>
<span>Codex</span>
</button>
<button class="text-slate-400 p-1 flex flex-col items-center gap-1 group hover:bg-[#534AB7]/10 active:scale-95 duration-75">
<span class="material-symbols-outlined">precision_manufacturing</span>
<span>Cursor</span>
</button>
</nav>
</aside>
<!-- Main Content Area -->
<main class="ml-16 w-full flex items-center justify-center p-8">
<!-- Compact Popup Card: Stash Intent Narrative -->
<div class="w-[320px] bg-[#1a1a2e] border border-[#534AB7] rounded-[4px] overflow-hidden shadow-2xl flex flex-col">
<!-- Section 1: Intent Narrative Area -->
<div class="p-3 relative">
<div class="flex justify-between items-start mb-2">
<div class="flex items-center gap-1.5">
<div class="w-2 h-2 bg-[#534AB7]"></div>
<span class="font-mono text-[10px] text-[#534AB7] uppercase tracking-wider font-bold">Intent Narrative</span>
</div>
<span class="bg-slate-700 text-slate-300 text-[10px] px-1.5 py-0.5 rounded-[2px] font-mono leading-none">AUTO</span>
</div>
<p class="text-[12px] leading-relaxed text-[#e0e0e0] font-body">
                    正在修复 token refresh 的边界 case。策略变更：从 throw error 改为 silent retry + log。Max retry 设为 5。当前 8/12 tests pass。
                </p>
<!-- Pixel Art Mascot Decoration -->
<div class="mt-3 flex items-end justify-between">
<div class="flex gap-0.5">
<div class="w-1 h-1 bg-[#534AB7]/40"></div>
<div class="w-1 h-1 bg-[#534AB7]/60"></div>
<div class="w-1 h-1 bg-[#534AB7]"></div>
</div>
<div class="flex items-center gap-2">
<span class="font-mono text-[9px] text-slate-500">PROCESSED BY STASH_V2</span>
</div>
</div>
</div>
<!-- Section 2: Status Line -->
<div class="px-3 py-2 bg-slate-900/50 border-t border-b border-[#534AB7]/30 flex items-center gap-2">
<span class="text-[#0F6E56] text-[12px] leading-none">●</span>
<span class="text-[11px] font-medium text-[#0F6E56] tracking-tight">Claude Code 完成 · PR #287 待 review</span>
</div>
<!-- Section 3: Bottom Action -->
<div class="p-2">
<button class="w-full bg-[#534AB7] hover:bg-[#6359d4] active:translate-y-0.5 text-white py-2 px-4 rounded-[4px] text-[12px] font-bold flex items-center justify-center gap-2 transition-all duration-75">
                    打开 PR
                    <span class="material-symbols-outlined text-[14px]">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- TopNavBar (Shared Component) -->
<header class="fixed top-0 left-16 right-0 bg-slate-950 text-[#534AB7] font-mono text-[12px] uppercase tracking-tight border-b-2 border-[#534AB7] flex justify-between items-center px-4 h-10 z-40">
<div class="flex items-center gap-4">
<span class="text-lg font-black text-[#534AB7]">Stash</span>
<nav class="hidden md:flex gap-4">
<a class="text-[#534AB7] border-b-2 border-[#534AB7] hover:bg-[#534AB7]/20 transition-colors" href="#">Dashboard</a>
<a class="text-slate-500 hover:bg-[#534AB7]/20 transition-colors" href="#">Logs</a>
<a class="text-slate-500 hover:bg-[#534AB7]/20 transition-colors" href="#">Assets</a>
</nav>
</div>
<div class="flex items-center gap-3">
<button class="material-symbols-outlined text-slate-500 hover:text-[#534AB7] transition-colors">account_circle</button>
<button class="material-symbols-outlined text-slate-500 hover:text-[#534AB7] transition-colors">settings</button>
</div>
</header>
</body></html>
